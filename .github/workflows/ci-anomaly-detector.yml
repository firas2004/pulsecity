# ── PulseCity CI — Anomaly Detector ──────────────────────────────────────────
# Pipeline : tests → build image → scan Trivy → push GHCR → update manifest K8s
name: CI — Anomaly Detector

on:
  push:
    branches: [main]
    paths:
      - "anomaly-detector/**"
      - ".github/workflows/ci-anomaly-detector.yml"
  pull_request:
    branches: [main]
    paths:
      - "anomaly-detector/**"

env:
  IMAGE_NAME: ghcr.io/firas2004/pulsecity-anomaly-detector

jobs:
  # ── Job 1 : Tests unitaires ─────────────────────────────────────────────────
  test:
    name: 🧪 Tests unitaires
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Installer les dépendances
        run: |
          pip install -r anomaly-detector/requirements.txt
          pip install pytest pytest-cov httpx

      - name: Lancer les tests
        env:
          PYTHONPATH: anomaly-detector
        run: |
          pytest anomaly-detector/tests/ -v --cov=anomaly-detector --cov-report=term-missing

  # ── Job 2 : Build, scan et push (uniquement sur main) ──────────────────────
  build-push:
    name: 🐳 Build → Scan → Push → Update manifest
    needs: test
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    permissions:
      contents: write
      packages: write
      security-events: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Calculer le short SHA
        id: sha
        run: echo "short=$(echo ${{ github.sha }} | cut -c1-7)" >> $GITHUB_OUTPUT

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extraire les métadonnées Docker
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.IMAGE_NAME }}
          tags: |
            type=raw,value=sha-${{ steps.sha.outputs.short }}
            type=raw,value=latest

      - name: Build et Push l'image
        uses: docker/build-push-action@v6
        with:
          context: ./anomaly-detector
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Scan Trivy
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: ${{ env.IMAGE_NAME }}:sha-${{ steps.sha.outputs.short }}
          format: table
          exit-code: "0"
          ignore-unfixed: true
          severity: CRITICAL,HIGH

      - name: Mettre à jour le tag d'image dans le manifest K8s
        run: |
          NEW_IMAGE="${{ env.IMAGE_NAME }}:sha-${{ steps.sha.outputs.short }}"
          sed -i "s|image: ghcr.io/firas2004/pulsecity-anomaly-detector:.*|image: ${NEW_IMAGE}|g" \
            k8s/anomaly-detector/deployment.yaml
          echo "✅ Manifest mis à jour : ${NEW_IMAGE}"

      - name: Commit et push le manifest mis à jour
        run: |
          git config --global user.name  "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add k8s/anomaly-detector/deployment.yaml
          git diff --staged --quiet && echo "Pas de changement" || \
            git commit -m "ci(anomaly-detector): update image → sha-${{ steps.sha.outputs.short }} [skip ci]"
          git push
