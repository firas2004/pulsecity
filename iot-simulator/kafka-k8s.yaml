---
# ── PulseCity – Kafka Single-Node (KRaft, image Confluent) ──────────────────
# Image : confluentinc/cp-kafka:7.7.0  (disponible gratuitement sur Docker Hub)
# Mode  : KRaft (sans ZooKeeper, Kafka >= 3.3)

# ── Service : expose le broker en interne au cluster jjjj ────────────────────────
apiVersion: v1
kind: Service
metadata:
  name: kafka
  namespace: kafka
  labels:
    app: kafka
    project: pulsecity
spec:
  selector:
    app: kafka
  ports:
    - name: client
      port: 9092
      targetPort: 9092
    - name: controller
      port: 9093
      targetPort: 9093
  type: ClusterIP

---
# ── StatefulSet : un seul nœud Kafka ────────────────────────────────────────
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: kafka
  namespace: kafka
  labels:
    app: kafka
    project: pulsecity
spec:
  serviceName: kafka
  replicas: 1
  selector:
    matchLabels:
      app: kafka
  template:
    metadata:
      labels:
        app: kafka
        project: pulsecity
    spec:
      # CRITIQUE : empêche Kubernetes d'injecter KAFKA_PORT, KAFKA_SERVICE_HOST, etc.
      # Ces variables créent un conflit fatal avec le script de démarrage de cp-kafka
      enableServiceLinks: false
      containers:
        - name: kafka
          image: confluentinc/cp-kafka:7.7.0
          imagePullPolicy: IfNotPresent  # Kind pull depuis Docker Hub si l'image n'est pas déjà présente
          ports:
            - name: client
              containerPort: 9092
            - name: controller
              containerPort: 9093
          env:
            # ── Identité du nœud ──────────────────────────────────────────
            - name: KAFKA_NODE_ID
              value: "1"
            - name: CLUSTER_ID
              value: "MkU3OEVBNTcwNTJENDM2Qg=="   # UUID base64 validé (avec padding ==)

            # ── Mode KRaft : broker + controller sur le même nœud ─────────
            - name: KAFKA_PROCESS_ROLES
              value: "broker,controller"
            - name: KAFKA_CONTROLLER_QUORUM_VOTERS
              value: "1@kafka-0.kafka.kafka.svc.cluster.local:9093"
            - name: KAFKA_CONTROLLER_LISTENER_NAMES
              value: "CONTROLLER"
            - name: KAFKA_INTER_BROKER_LISTENER_NAME
              value: "PLAINTEXT"

            # ── Listeners ─────────────────────────────────────────────────
            - name: KAFKA_LISTENER_SECURITY_PROTOCOL_MAP
              value: "CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT"
            - name: KAFKA_LISTENERS
              value: "PLAINTEXT://:9092,CONTROLLER://:9093"
            - name: KAFKA_ADVERTISED_LISTENERS
              value: "PLAINTEXT://kafka.kafka.svc.cluster.local:9092"

            # ── Paramètres single-node ────────────────────────────────────
            - name: KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR
              value: "1"
            - name: KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR
              value: "1"
            - name: KAFKA_TRANSACTION_STATE_LOG_MIN_ISR
              value: "1"
            - name: KAFKA_GROUP_INITIAL_REBALANCE_DELAY_MS
              value: "0"
            - name: KAFKA_AUTO_CREATE_TOPICS_ENABLE
              value: "true"
            - name: KAFKA_LOG_DIRS
              value: "/tmp/kraft-combined-logs"

          resources:
            requests:
              memory: "512Mi"
              cpu: "250m"
            limits:
              memory: "1Gi"
              cpu: "500m"

          readinessProbe:
            tcpSocket:
              port: 9092
            initialDelaySeconds: 15
            periodSeconds: 10
          livenessProbe:
            tcpSocket:
              port: 9092
            initialDelaySeconds: 30
            periodSeconds: 15
