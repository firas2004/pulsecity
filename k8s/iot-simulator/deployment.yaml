---
# ── PulseCity – IoT Simulator Deployment (Production Hardened) ─────────────────
apiVersion: apps/v1
kind: Deployment
metadata:
  name: iot-simulator
  namespace: default
  labels:
    app: iot-simulator
    project: pulsecity
    version: v3
  annotations:
    prometheus.io/scrape: "true"
    prometheus.io/port: "8001"
    prometheus.io/path: "/metrics"
spec:
  replicas: 1
  selector:
    matchLabels:
      app: iot-simulator
  template:
    metadata:
      labels:
        app: iot-simulator
        project: pulsecity
        version: v3
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "8001"
    spec:
      enableServiceLinks: false

      # ── Sécurité du Pod ───────────────────────────────────────────────────
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        runAsGroup: 1000
        fsGroup: 1000
        seccompProfile:
          type: RuntimeDefault

      initContainers:
        - name: wait-for-kafka
          image: busybox:1.36
          imagePullPolicy: IfNotPresent
          securityContext:
            runAsNonRoot: true
            runAsUser: 1000
            allowPrivilegeEscalation: false
            capabilities:
              drop: ["ALL"]
          command:
            - sh
            - -c
            - |
              until nc -z kafka.kafka.svc.cluster.local 9092; do
                echo "En attente de Kafka...";
                sleep 5;
              done;
              echo "Kafka prêt !"
          resources:
            requests:
              cpu: 10m
              memory: 16Mi
            limits:
              cpu: 50m
              memory: 32Mi

      containers:
        - name: sensor
          image: ghcr.io/firas2004/pulsecity-sensor:sha-c0b6aa0
          imagePullPolicy: Always

          # ── Sécurité du conteneur ────────────────────────────────────────
          securityContext:
            runAsNonRoot: true
            runAsUser: 1000
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop: ["ALL"]

          ports:
            - name: metrics
              containerPort: 8001
              protocol: TCP

          env:
            - name: KAFKA_BOOTSTRAP_SERVERS
              value: "kafka.kafka.svc.cluster.local:9092"
            - name: SEND_INTERVAL_SECONDS
              value: "5"
            - name: ANOMALY_PROBABILITY
              value: "0.10"
            - name: METRICS_PORT
              value: "8001"
            - name: PYTHONUNBUFFERED
              value: "1"
            - name: BACKEND_URL
              value: "http://backend-v2.default.svc.cluster.local:8002"
            - name: SENSOR_REFRESH_SECONDS
              value: "60"

          # ── Ressources (CPU + Mémoire) ───────────────────────────────────
          resources:
            requests:
              memory: "128Mi"
              cpu: "100m"
            limits:
              memory: "256Mi"
              cpu: "300m"

          # ── Sondes de santé ───────────────────────────────────────────────
          livenessProbe:
            httpGet:
              path: /metrics
              port: 8001
            initialDelaySeconds: 30
            periodSeconds: 30
            failureThreshold: 3
            successThreshold: 1
            timeoutSeconds: 5

          readinessProbe:
            httpGet:
              path: /metrics
              port: 8001
            initialDelaySeconds: 15
            periodSeconds: 10
            failureThreshold: 5
            successThreshold: 1
            timeoutSeconds: 5

          # Volume temporaire pour Python cache (car readOnlyRootFilesystem=true)
          volumeMounts:
            - name: tmp-dir
              mountPath: /tmp

      volumes:
        - name: tmp-dir
          emptyDir: {}

      restartPolicy: Always
