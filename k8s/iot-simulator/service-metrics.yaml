---
# ── Service métriques iot-simulator (port 8001) ──────────────────────────────
apiVersion: v1
kind: Service
metadata:
  name: iot-simulator-metrics
  namespace: default
  labels:
    app: iot-simulator
    project: pulsecity
spec:
  selector:
    app: iot-simulator
  ports:
    - name: metrics
      port: 8001
      targetPort: 8001
  type: ClusterIP
