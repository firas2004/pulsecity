---
# ── PulseCity — Anomaly Detector Deployment (Production Hardened) ─────────────
apiVersion: apps/v1
kind: Deployment
metadata:
  name: anomaly-detector
  namespace: default
  labels:
    app: anomaly-detector
    project: pulsecity
    version: v2
  annotations:
    prometheus.io/scrape: "true"
    prometheus.io/port: "8000"
    prometheus.io/path: "/metrics"
spec:
  replicas: 1
  selector:
    matchLabels:
      app: anomaly-detector
  template:
    metadata:
      labels:
        app: anomaly-detector
        project: pulsecity
        version: v2
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "8000"
    spec:
      enableServiceLinks: false

      # ── Sécurité du Pod ───────────────────────────────────────────────────
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        runAsGroup: 1000
        fsGroup: 1000
        seccompProfile:
          type: RuntimeDefault

      initContainers:
        - name: wait-for-kafka
          image: busybox:1.36
          imagePullPolicy: IfNotPresent
          securityContext:
            runAsNonRoot: true
            runAsUser: 1000
            allowPrivilegeEscalation: false
            capabilities:
              drop: ["ALL"]
          command:
            - sh
            - -c
            - |
              until nc -z kafka.kafka.svc.cluster.local 9092; do
                echo "En attente de Kafka...";
                sleep 5;
              done;
              echo "Kafka prêt !"
          resources:
            requests:
              cpu: 10m
              memory: 16Mi
            limits:
              cpu: 50m
              memory: 32Mi

      containers:
        - name: anomaly-detector
          image: ghcr.io/firas2004/pulsecity-anomaly-detector:sha-1b05b88
          imagePullPolicy: Always

          # ── Sécurité du conteneur ────────────────────────────────────────
          securityContext:
            runAsNonRoot: true
            runAsUser: 1000
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop: ["ALL"]

          ports:
            - name: http
              containerPort: 8000
              protocol: TCP

          env:
            - name: KAFKA_BOOTSTRAP_SERVERS
              value: "kafka.kafka.svc.cluster.local:9092"
            - name: WINDOW_SIZE
              value: "50"
            - name: MIN_SAMPLES
              value: "15"
            - name: ANOMALY_THRESHOLD
              value: "-0.05"
            - name: API_PORT
              value: "8000"
            - name: PYTHONUNBUFFERED
              value: "1"

          # ── Ressources (CPU + Mémoire) ───────────────────────────────────
          resources:
            requests:
              memory: "256Mi"
              cpu: "200m"
            limits:
              memory: "512Mi"
              cpu: "500m"

          # ── Sondes de santé ───────────────────────────────────────────────
          readinessProbe:
            httpGet:
              path: /health
              port: 8000
              scheme: HTTP
            initialDelaySeconds: 20
            periodSeconds: 10
            failureThreshold: 5
            successThreshold: 1
            timeoutSeconds: 5

          livenessProbe:
            httpGet:
              path: /health
              port: 8000
              scheme: HTTP
            initialDelaySeconds: 30
            periodSeconds: 20
            failureThreshold: 3
            successThreshold: 1
            timeoutSeconds: 5

          # startupProbe : laisse du temps au modèle ML pour s'initialiser
          startupProbe:
            httpGet:
              path: /health
              port: 8000
            failureThreshold: 12
            periodSeconds: 10

          # Volumes temporaires pour scikit-learn cache (readOnlyRootFilesystem=true)
          volumeMounts:
            - name: tmp-dir
              mountPath: /tmp

      volumes:
        - name: tmp-dir
          emptyDir: {}

      restartPolicy: Always
