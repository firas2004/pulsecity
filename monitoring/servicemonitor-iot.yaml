---
# ── Service métriques iot-simulator (port 8001) ──────────────────────────────
apiVersion: v1
kind: Service
metadata:
  name: iot-simulator-metrics
  namespace: default
  labels:
    app: iot-simulator
    project: pulsecity
spec:
  selector:
    app: iot-simulator
  ports:
    - name: metrics
      port: 8001
      targetPort: 8001
  type: ClusterIP
---
# ── ServiceMonitor : iot-simulator (port 8001, /metrics) ────────────────────
apiVersion: monitoring.coreos.com/v1
kind: ServiceMonitor
metadata:
  name: iot-simulator
  namespace: monitoring
  labels:
    app: iot-simulator
    release: kube-prometheus-stack
spec:
  namespaceSelector:
    matchNames:
      - default
  selector:
    matchLabels:
      app: iot-simulator
  endpoints:
    - port: metrics
      path: /metrics
      interval: 15s
      scrapeTimeout: 10s
