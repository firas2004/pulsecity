server {
    listen 80;
    server_name _;

    # Fix 413 Request Entity Too Large (ChatBot large prompts)
    client_max_body_size 20m;

    root /usr/share/nginx/html;
    index index.html;

    # Gzip compression
    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml application/xml+rss text/javascript;
    gzip_min_length 1024;

    # Security Headers
    add_header X-Frame-Options "DENY" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;

    # ── API Proxy → backend-v2 service (in-cluster) ──────────────────────────
    # All /api/* requests are forwarded to backend-v2:8002 inside the K8s cluster
    # This avoids needing any kubectl port-forward for the backend!
    location /api/ {
        proxy_pass http://backend-v2:8002/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # CORS headers for browser requests
        add_header Access-Control-Allow-Origin "*" always;
        add_header Access-Control-Allow-Methods "GET, POST, PUT, DELETE, OPTIONS" always;
        add_header Access-Control-Allow-Headers "Authorization, Content-Type" always;

        if ($request_method = OPTIONS) {
            return 204;
        }

        proxy_read_timeout 30s;
        proxy_connect_timeout 10s;
    }

    # ── WebSocket Proxy → /ws/* ───────────────────────────────────────────────
    location /ws/ {
        proxy_pass http://backend-v2:8002/ws/;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "Upgrade";
        proxy_set_header Host $host;
        proxy_read_timeout 3600s;
    }

    # ── SPA React Router ─────────────────────────────────────────────────────
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Cache long for hashed static assets
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff2|woff|ttf)$ {
        expires 1y;
        add_header Cache-Control "public, max-age=31536000, immutable";
        access_log off;
    }

    # No cache for index.html
    location = /index.html {
        add_header Cache-Control "no-store, no-cache, must-revalidate";
    }

    # Nginx health check
    location /nginx-health {
        return 200 "OK";
        add_header Content-Type text/plain;
    }
}
