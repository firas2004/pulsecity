---
# ── PulseCity — Frontend Service ─────────────────────────────────────────────
apiVersion: v1
kind: Service
metadata:
  name: pulsecity-frontend
  namespace: default
  labels:
    app: pulsecity-frontend
    project: pulsecity
spec:
  selector:
    app: pulsecity-frontend
  type: NodePort
  ports:
    - name: http
      port: 80
      targetPort: 80
      nodePort: 30080
      protocol: TCP
